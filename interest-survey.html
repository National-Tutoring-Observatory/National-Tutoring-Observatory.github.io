<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Survey - National Tutoring Observatory</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navbar Component -->
    <div id="navbar-container"></div>

    <main>
        <!-- Interest Survey Embed -->
        <section class="survey-embed-section">
            <div class="survey-embed-wrapper">
                <iframe
                    class="survey-iframe"
                    src="https://cornell.ca1.qualtrics.com/jfe/form/SV_ddoeoRv6V481Rj0"
                    title="National Tutoring Observatory Interest Survey"
                    loading="lazy"
                    allow="fullscreen"></iframe>
            </div>
            <p class="survey-fallback body-text">
                Survey not loading?
                <a href="https://cornell.ca1.qualtrics.com/jfe/form/SV_ddoeoRv6V481Rj0"
                   target="_blank" rel="noopener noreferrer" class="text-accent">
                    Open it in a new tab
                </a>.
            </p>
        </section>
    </main>

    <!-- Footer Component -->
    <div id="footer-container"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Component Loader -->
    <script src="js/components.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    <!-- Initialize Feather Icons -->
    <script>
        feather.replace();
    </script>
</body>
</html>
